services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketing_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    restart: unless-stopped
    command: sh -c "python manage.py migrate --noinput && daphne -b 0.0.0.0 -p 8000 TicketSystem141.asgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  celery_worker:
    build: .
    restart: unless-stopped
    command: sh -c "celery -A TicketSystem141 worker --loglevel=info"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env

  celery_beat:
    build: .
    restart: unless-stopped
    command: sh -c "celery -A TicketSystem141 beat --loglevel=info"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - ./.env

volumes:
  postgres_data: