{% extends "base.html" %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<style>
    .login-wrap {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
    }

    .login-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow-md);
        padding: 2.75rem 2.5rem;
        width: 100%;
        max-width: 420px;
    }

    .login-logo {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-logo-icon {
        width: 56px;
        height: 56px;
        background: var(--accent-dk);
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
        box-shadow: 0 4px 14px rgba(30,61,92,0.25);
    }

    .login-logo-icon svg {
        width: 28px;
        height: 28px;
        fill: none;
        stroke: #fff;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .login-title {
        font-family: 'Lora', serif;
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--accent-dk);
        margin-bottom: 0.3rem;
    }

    .login-sub {
        font-size: 0.88rem;
        color: var(--text-3);
    }

    .login-error {
        background: #fdf0ef;
        border: 1px solid #f0b8b4;
        border-left: 3px solid var(--danger);
        color: #7b1c14;
        padding: 0.7rem 1rem;
        border-radius: 8px;
        margin-bottom: 1.25rem;
        font-size: 0.9rem;
    }

    .field-group {
        margin-bottom: 1.25rem;
    }

    .field-group label {
        display: block;
        font-weight: 600;
        font-size: 0.82rem;
        color: var(--text-2);
        margin-bottom: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .field-group input[type="text"],
    .field-group input[type="password"] {
        width: 100%;
        padding: 0.7rem 0.95rem;
        border: 1.5px solid var(--border);
        border-radius: 9px;
        font-family: inherit;
        font-size: 0.97rem;
        color: var(--text);
        background: var(--bg);
        transition: border-color 0.15s, box-shadow 0.15s;
        outline: none;
    }

    .field-group input:focus {
        border-color: var(--accent);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(43,82,120,0.12);
    }

    .remember-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 1.5rem;
    }

    .remember-row input[type="checkbox"] {
        width: 17px;
        height: 17px;
        accent-color: var(--accent);
        cursor: pointer;
        flex-shrink: 0;
        border-radius: 4px;
    }

    .remember-row label {
        font-size: 0.9rem;
        color: var(--text-2);
        font-weight: 400;
        text-transform: none;
        letter-spacing: 0;
        cursor: pointer;
        margin: 0;
    }

    .login-btn {
        width: 100%;
        justify-content: center;
        padding: 0.75rem 1.4rem;
        font-size: 1rem;
        border-radius: 9px;
        letter-spacing: 0.02em;
        margin-bottom: 0;
    }
</style>

<div class="login-wrap">
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <div class="login-title">Добро пожаловать</div>
            <div class="login-sub">Войдите в IT портал поддержки</div>
        </div>

        {% if form.errors %}
            <div class="login-error">
                Неверный логин или пароль. Попробуйте ещё раз.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="field-group">
                <label for="id_username">Имя пользователя</label>
                <input type="text"
                       name="username"
                       id="id_username"
                       autocomplete="username"
                       autofocus
                       placeholder="Введите логин"
                       {% if form.username.value %}value="{{ form.username.value }}"{% endif %}>
            </div>

            <div class="field-group">
                <label for="id_password">Пароль</label>
                <input type="password"
                       name="password"
                       id="id_password"
                       autocomplete="current-password"
                       placeholder="Введите пароль">
            </div>

            <div class="remember-row">
                <input type="checkbox" name="remember_me" id="id_remember_me">
                <label for="id_remember_me">Запомнить меня</label>
            </div>

            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <button type="submit" class="btn login-btn">Войти</button>
        </form>
    </div>
</div>
{% endblock %}
