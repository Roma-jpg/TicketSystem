{% extends "base.html" %}

{% block title %}Выход из системы{% endblock %}

{% block content %}
<style>
    .logout-wrap {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
    }

    .logout-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow-md);
        padding: 2.75rem 2.5rem;
        width: 100%;
        max-width: 420px;
        text-align: center;
    }

    .logout-icon {
        width: 56px;
        height: 56px;
        background: var(--accent-dk);
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.25rem;
        box-shadow: 0 4px 14px rgba(30,61,92,0.25);
    }

    .logout-icon svg {
        width: 28px;
        height: 28px;
        fill: none;
        stroke: #fff;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .logout-title {
        font-family: 'Lora', serif;
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--accent-dk);
        margin-bottom: 0.5rem;
    }

    .logout-sub {
        font-size: 0.92rem;
        color: var(--text-3);
        margin-bottom: 1.75rem;
        line-height: 1.6;
    }

    .login-btn {
        width: 100%;
        justify-content: center;
        padding: 0.75rem 1.4rem;
        font-size: 1rem;
        border-radius: 9px;
        letter-spacing: 0.02em;
    }
</style>

<div class="logout-wrap">
    <div class="logout-card">
        <div class="logout-icon">
            <!-- Checkmark icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <div class="logout-title">Вы вышли из системы</div>
        <p class="logout-sub">
            Ваша сессия завершена. Вы можете войти снова, используя кнопку ниже.
        </p>
        <a href="{% url 'login' %}" class="btn login-btn">Войти снова</a>
    </div>
</div>
{% endblock %}
