{% extends "base.html" %}

{% block title %}Выход из системы{% endblock %}
{% load static %}
{% block content %}
<style>
    /* 1. HIDE TOP NAV/BLUE BAR */
    nav, .navbar, header, .top-bar {
    display: none !important;
    }

    .logout-wrap {
    min-height: 100vh;
    min-height: 100dvh;
    height: 100%;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    top: 0;
    left: 0;
    background: url('{% static 'images/forest_background.jpg' %}') no-repeat center center;
    background-size: cover;
    z-index: 9999;
    overflow-y: auto;
    }

    .logout-wrap::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(60px);
    -webkit-backdrop-filter: blur(60px);
    z-index: 1;
    }

    .logout-card {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 28px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    padding: 3.5rem 2.5rem;
    width: 100%;
    max-width: 400px;
    text-align: center;
    animation: slideUpFade 0.7s ease-out;
    }

    @keyframes slideUpFade {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
    }

    .logout-icon {
    width: 64px;
    height: 64px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
    border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .logout-title {
    font-family: 'Lora', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 0.75rem;
    text-shadow: 0 2px 4px rgba(0,0,0,0.15);
    }

    .logout-sub {
    font-size: 0.95rem;
    color: rgba(255, 255, 255, 0.8);
    margin-bottom: 2.5rem;
    line-height: 1.6;
    }

    .login-btn {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    background: #ffffff;
    color: #2d4a53;
    text-decoration: none;
    padding: 1rem;
    font-size: 1rem;
    font-weight: 700;
    border-radius: 14px;
    transition: all 0.3s ease;
    box-sizing: border-box;
    }

    .login-btn:hover {
    background: #f0f0f0;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .footer-credit {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    width: auto;
    max-width: 90vw;
    padding: 0 1rem;
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.4);
    z-index: 10000;
    pointer-events: auto;
    text-align: center;
    cursor: default;
    white-space: nowrap;
    transition: transform 2.0s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    background: linear-gradient(
    90deg,
    rgba(255, 255, 255, 0.4) 0%,
    rgba(255, 255, 255, 0.4) 40%,
    rgba(255, 255, 255, 1) 50%,
    rgba(255, 255, 255, 0.4) 60%,
    rgba(255, 255, 255, 0.4) 100%
    );
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    }

    .footer-credit.active {
    transform: translateX(-50%) translateY(-10px);
    animation: sunbeam 5.0s infinite linear;
    }

    @keyframes sunbeam {
    0% { background-position: 200% center; }
    100% { background-position: -200% center; }
    }
</style>

<div class="logout-wrap" id="logoutWrap">
    <div class="logout-card">
        <div class="logout-icon">
            <svg viewBox="0 0 24 24" width="32" height="32" stroke="white" stroke-width="2.5" fill="none"
                 stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>

        <div class="logout-title">Вы вышли из системы</div>

        <p class="logout-sub">
            Ваша сессия завершена. Вы можете войти снова, используя кнопку ниже.
        </p>

        <a href="{% url 'login' %}" class="login-btn">Войти снова</a>
    </div>
</div>

<div class="footer-credit">
    Сделано Кошелевым Романом с ❤️
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
    const footer = document.querySelector('.footer-credit');
    if (footer) {
    footer.addEventListener('mouseenter', () => footer.classList.add('active'));
    footer.addEventListener('mouseleave', () => footer.classList.remove('active'));
    }

    const wrap = document.getElementById('logoutWrap');
    function resizeWrap() {
    if (wrap) {
    wrap.style.height = window.innerHeight + 'px';
    }
    }
    window.addEventListener('resize', resizeWrap);
    window.addEventListener('orientationchange', resizeWrap);
    resizeWrap();
    });
</script>
{% endblock %}
